name: Setup Node.js and pnpm
description: Setup Node.js, activate the packageManager-pinned pnpm with Corepack, and cache the pnpm store.

inputs:
  node-version-file:
    description: File that declares the Node.js version.
    required: false
    default: package.json
  registry-url:
    description: Optional npm registry URL for publish jobs.
    required: false
    default: ''
  cache-mode:
    description: Use restore-save to populate the cache, or restore to only read from it.
    required: false
    default: restore-save

runs:
  using: composite
  steps:
    - name: Setup Node.js
      if: inputs.registry-url == ''
      uses: actions/setup-node@v6
      with:
        node-version-file: ${{ inputs.node-version-file }}

    - name: Setup Node.js for npm publishing
      if: inputs.registry-url != ''
      uses: actions/setup-node@v6
      with:
        node-version-file: ${{ inputs.node-version-file }}
        registry-url: ${{ inputs.registry-url }}

    - name: Enable Corepack pnpm
      shell: bash
      run: |
        npm install --global corepack@latest
        corepack enable
        corepack install
        pnpm --version

    - name: Resolve pnpm store path
      id: pnpm-store
      shell: bash
      run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

    - name: Restore pnpm store
      if: inputs.cache-mode == 'restore'
      uses: actions/cache/restore@v6
      with:
        path: ${{ steps.pnpm-store.outputs.path }}
        key: pnpm-store-${{ runner.os }}-${{ hashFiles('package.json', 'pnpm-lock.yaml') }}
        restore-keys: |
          pnpm-store-${{ runner.os }}-

    - name: Restore and save pnpm store
      if: inputs.cache-mode != 'restore'
      uses: actions/cache@v6
      with:
        path: ${{ steps.pnpm-store.outputs.path }}
        key: pnpm-store-${{ runner.os }}-${{ hashFiles('package.json', 'pnpm-lock.yaml') }}
        restore-keys: |
          pnpm-store-${{ runner.os }}-
