name: YCloud Icons Angular Checks

on:
  pull_request:
    paths:
      - icons/**
      - business-icons/**
      - illustration-icons/**
      - scripts/generateBusinessIconsPackage.mts
      - scripts/generateIllustrationsPackage.mts
      - scripts/writeAssetMetadata.mts
      - scripts/writeBusinessIconIndex.mts
      - scripts/writeIllustrationIndex.mts
      - scripts/render/**
      - packages/icons-angular/**
      - tools/build-helpers/**
      - tools/build-icons/**

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: YCloud Icons Angular
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter @ycloud-web/icons-angular build

      - name: Test
        run: pnpm --filter @ycloud-web/icons-angular test
