name: YCloud Icons React Checks

on:
  push:
    branches:
      - next
    paths:
      - icons/**
      - business-icons/**
      - illustration-icons/**
      - scripts/generateBusinessIconsPackage.mts
      - scripts/generateIllustrationsPackage.mts
      - scripts/writeAssetMetadata.mts
      - scripts/writeBusinessIconIndex.mts
      - scripts/writeIllustrationIndex.mts
      - scripts/render/**
      - .github/actions/setup-pnpm/**
      - package.json
      - packages/icons-react/**
      - packages/icons-shared/**
      - pnpm-workspace.yaml
      - scripts/generateNextJSAliases.mjs
      - tools/build-icons/**
      - tools/rollup-plugins/**
  pull_request:
    paths:
      - icons/**
      - business-icons/**
      - illustration-icons/**
      - scripts/generateBusinessIconsPackage.mts
      - scripts/generateIllustrationsPackage.mts
      - scripts/writeAssetMetadata.mts
      - scripts/writeBusinessIconIndex.mts
      - scripts/writeIllustrationIndex.mts
      - scripts/render/**
      - packages/icons-react/**
      - packages/icons-shared/**
      - tools/build-icons/**
      - tools/rollup-plugins/**
      - scripts/generateNextJSAliases.mjs

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: YCloud Icons React
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter @ycloud-web/icons-react build

      - name: Test
        run: pnpm --filter @ycloud-web/icons-react test
