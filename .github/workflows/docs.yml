name: Deploy Docs

on:
  # Docs deployment is release-driven so GitHub Pages builds against the npm packages
  # that were just published. Local docs development still uses workspace packages.
  # Keep this block disabled unless main-push docs deploys are intentionally restored.
  # push:
  #   branches:
  #     - main
  #   paths:
  #     - '.github/actions/setup-pnpm/**'
  #     - '.github/workflows/docs.yml'
  #     - 'categories/**'
  #     - 'changelogs/releases/**'
  #     - 'docs/**'
  #     - 'icons/**'
  #     - 'packages/**'
  #     - 'pnpm-lock.yaml'
  #     - 'pnpm-workspace.yaml'
  #     - 'scripts/writeChangelog.mts'
  workflow_call:
    inputs:
      ref:
        description: Git ref to deploy
        default: ${{ github.ref }}
        type: string
      package_version:
        description: Published icon package version to use for the docs build
        default: ''
        type: string
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy
        default: main
        type: string
      package_version:
        description: Published icon package version to use for the docs build
        default: ''
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip docs]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Configure git default branch
        run: git config --global init.defaultBranch main

      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref || github.ref }}

      - uses: ./.github/actions/setup-pnpm

      - name: Use published icon packages
        if: ${{ inputs.package_version != '' }}
        run: |
          node <<'NODE'
          const { readFileSync, writeFileSync } = require('node:fs');

          const version = process.env.PACKAGE_VERSION;
          const packagePath = 'docs/package.json';
          const manifest = JSON.parse(readFileSync(packagePath, 'utf8'));
          const iconPackagePattern = /^@ycloud-web\/icons(?:$|-)/;

          for (const dependencyType of ['dependencies', 'devDependencies']) {
            const dependencies = manifest[dependencyType];
            if (!dependencies) {
              continue;
            }

            for (const packageName of Object.keys(dependencies)) {
              if (iconPackagePattern.test(packageName)) {
                dependencies[packageName] = version;
              }
            }
          }

          writeFileSync(packagePath, `${JSON.stringify(manifest, null, 2)}\n`);
          NODE
        env:
          PACKAGE_VERSION: ${{ inputs.package_version }}

      - name: Install dependencies
        if: ${{ inputs.package_version == '' }}
        run: pnpm install --frozen-lockfile

      - name: Install dependencies with published icon packages
        if: ${{ inputs.package_version != '' }}
        run: pnpm install --no-frozen-lockfile --config.link-workspace-packages=false

      - name: Generate GitHub Pages cache key
        id: pages-cache-key
        run: |
          release_tags_hash="$(git tag --list 'v*' --sort=-version:refname | sha256sum | cut -d ' ' -f 1)"
          if [[ -n "$PACKAGE_VERSION" ]]; then
            icon_packages_hash="npm-${PACKAGE_VERSION}"
          else
            icon_packages_hash="workspace-$(git ls-files -z packages | xargs -0 sha256sum | sha256sum | cut -d ' ' -f 1)"
          fi

          echo "release-tags=${release_tags_hash}-${PACKAGE_VERSION:-workspace}" >> "$GITHUB_OUTPUT"
          echo "icon-packages=${icon_packages_hash}" >> "$GITHUB_OUTPUT"
        env:
          PACKAGE_VERSION: ${{ inputs.package_version }}

      - name: Restore GitHub Pages build output
        id: pages-build-cache
        uses: actions/cache@v6
        with:
          path: docs/.vercel/output/static
          key: pages-static-${{ runner.os }}-${{ steps.pages-cache-key.outputs.release-tags }}-${{ steps.pages-cache-key.outputs.icon-packages }}-${{ hashFiles('docs/*.md', 'docs/*.ts', 'docs/*.json', 'docs/en/**', 'docs/guide/**', 'docs/icons/**', 'docs/images/**', 'docs/public/**', 'docs/.vitepress/**/*.ts', 'docs/.vitepress/**/*.vue', 'docs/.vitepress/**/*.css', 'docs/.vitepress/**/*.json', 'docs/.vitepress/**/*.svg', 'docs/scripts/**', 'icons/**', 'categories/**', 'changelogs/releases/**', 'scripts/writeChangelog.mts', 'scripts/writeGitHubReleaseNotes.mjs', 'docs/package.json', 'pnpm-lock.yaml', 'pnpm-workspace.yaml') }}

      - name: Build docs
        if: steps.pages-build-cache.outputs.cache-hit != 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          NODE_OPTIONS: --max-old-space-size=12288
        run: pnpm docs:build:github-pages

      - name: Reuse GitHub Pages build output
        if: steps.pages-build-cache.outputs.cache-hit == 'true'
        run: echo "Reused cached GitHub Pages build output."

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/.vercel/output/static

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        env:
          NODE_OPTIONS: --disable-warning=DEP0040
