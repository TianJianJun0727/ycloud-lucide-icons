name: Deploy Docs

on:
  workflow_call:
    inputs:
      ref:
        description: Git ref to deploy
        default: ${{ github.ref }}
        type: string
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy
        default: main
        type: string

permissions:
  contents: read
  pages: write
  id-token: write
  models: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Configure git default branch
        run: git config --global init.defaultBranch main

      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref || github.ref }}

      - uses: ./.github/actions/setup-pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate GitHub Pages cache key
        id: pages-cache-key
        run: |
          release_tags_hash="$(git tag --list 'v*' --sort=-version:refname | sha256sum | cut -d ' ' -f 1)"
          echo "release-tags=${release_tags_hash}" >> "$GITHUB_OUTPUT"

      - name: Restore GitHub Pages build output
        id: pages-build-cache
        uses: actions/cache@v5
        with:
          path: docs/.vercel/output/static
          key: pages-static-${{ runner.os }}-${{ steps.pages-cache-key.outputs.release-tags }}-${{ hashFiles('.github/workflows/docs.yml', 'docs/*.md', 'docs/*.ts', 'docs/*.json', 'docs/en/**', 'docs/guide/**', 'docs/icons/**', 'docs/images/**', 'docs/public/*', 'docs/public/framework-logos/**', 'docs/public/package-logos/**', 'docs/.vitepress/**/*.ts', 'docs/.vitepress/**/*.vue', 'docs/.vitepress/**/*.css', 'docs/.vitepress/**/*.json', 'docs/.vitepress/**/*.svg', 'docs/scripts/**', 'icons/**', 'categories/**', 'packages/**', 'scripts/**', 'tools/build-font/**', 'package.json', 'docs/package.json', 'pnpm-lock.yaml', 'pnpm-workspace.yaml') }}

      - name: Build docs
        if: steps.pages-build-cache.outputs.cache-hit != 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          NODE_OPTIONS: --max-old-space-size=8192
          YCLOUD_AI_CHANGELOG: '1'
        run: pnpm docs:build:github-pages

      - name: Reuse GitHub Pages build output
        if: steps.pages-build-cache.outputs.cache-hit == 'true'
        run: echo "Reused cached GitHub Pages build output."

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/.vercel/output/static

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        env:
          NODE_OPTIONS: --disable-warning=DEP0040
