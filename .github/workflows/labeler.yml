name: 'Pull Request Labeler'
on:
  - pull_request_target

jobs:
  triage:
    permissions:
      contents: read
      issues: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/labeler@v6
      - name: Label icon source PR
        if: startsWith(github.event.pull_request.head.ref, 'ycloud-icons-portal/') || contains(github.event.pull_request.body, 'ycloud-icons-source:figma-plugin') || contains(github.event.pull_request.body, 'ycloud-icons-source:portal')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "来源：Figma" --color "7c3aed" --description "由 Figma 插件提交" --force
          gh pr edit "${{ github.event.pull_request.number }}" --add-label "来源：Figma"
