name: Release Packages

on:
  push:
    tags:
      - 'v*'

  workflow_call:
    inputs:
      version:
        required: true
        description: Version
        type: string
      tag:
        description: NPM tag
        default: latest
        type: string

permissions:
  actions: write
  contents: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  prepare:
    if: github.repository == 'TianJianJun0727/ycloud-icons'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      npm-tag: ${{ steps.version.outputs.npm-tag }}

    steps:
      - name: Resolve version and tag
        id: version
        shell: bash
        run: |
          version_ref="${VERSION_REF}"
          version="${version_ref#refs/tags/}"
          version="${version#v}"
          npm_tag="${INPUT_TAG:-latest}"

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "npm-tag=${npm_tag}" >> "$GITHUB_OUTPUT"
        env:
          VERSION_REF: ${{ inputs.version || github.ref }}
          INPUT_TAG: ${{ inputs.tag || 'latest' }}

  release:
    if: github.repository == 'TianJianJun0727/ycloud-icons'
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: '@ycloud-web/icons'
            hasTest: true
          - package: '@ycloud-web/icons-react'
            hasTest: true
          - package: '@ycloud-web/icons-vue'
            hasTest: true
          - package: '@ycloud-web/icons-data'
            hasTest: true
          - package: '@ycloud-web/icons-angular'
            hasTest: true
          - package: '@ycloud-web/icons-astro'
            hasTest: true
          - package: '@ycloud-web/icons-svelte'
            hasTest: true
          - package: '@ycloud-web/icons-solid'
            hasTest: true
          - package: '@ycloud-web/icons-preact'
            hasTest: true
          - package: '@ycloud-web/icons-react-native'
            hasTest: true
          - package: '@ycloud-web/icons-static'
            hasTest: false

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          cache: pnpm
          registry-url: https://registry.npmjs.org
          node-version-file: package.json

      - name: Verify pnpm version
        run: pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set package version
        run: pnpm version ${{ needs.prepare.outputs.version }} --filter ${{ matrix.package }} --fail-if-no-match --no-git-tag-version

      - name: Build
        run: pnpm --filter ${{ matrix.package }} build

      - name: Test
        if: ${{ matrix.hasTest == true }}
        run: pnpm --filter ${{ matrix.package }} test

      - name: Publish
        run: pnpm --filter ${{ matrix.package }} publish --tag ${{ needs.prepare.outputs.npm-tag }} --access public --provenance --no-git-checks
        env:
          NPM_CONFIG_PROVENANCE: true

  github-release:
    if: github.repository == 'TianJianJun0727/ycloud-icons'
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          generate_release_notes: true

  sync-versions:
    if: github.repository == 'TianJianJun0727/ycloud-icons'
    needs:
      - prepare
      - release
      - github-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version-file: package.json

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync package versions
        run: node ./scripts/syncPackageVersions.mts "${VERSION}"
        env:
          VERSION: ${{ needs.prepare.outputs.version }}

      - name: Commit synced package versions
        shell: bash
        run: |
          if git diff --quiet -- packages; then
            echo "No package version changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/*/package.json
          git commit -m "chore(release): sync package versions to ${VERSION}"
          git push origin HEAD:main
        env:
          VERSION: ${{ needs.prepare.outputs.version }}

  trigger-docs:
    if: github.repository == 'TianJianJun0727/ycloud-icons'
    needs:
      - release
      - github-release
      - sync-versions
    permissions:
      actions: write
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Trigger docs deployment on main
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'docs.yml',
              ref: 'main',
            });
