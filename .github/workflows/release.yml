name: Release Packages

on:
  push:
    tags:
      - 'v*'

  workflow_call:
    inputs:
      version:
        required: true
        description: Version
        type: string
      tag:
        description: NPM tag
        default: latest
        type: string
      ref:
        description: Git ref to publish from. Use the release tag when available.
        default: ''
        type: string

permissions:
  contents: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  prepare:
    if: github.repository == 'TianJianJun0727/ycloud-icons'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      npm-tag: ${{ steps.version.outputs.npm-tag }}

    steps:
      - name: Resolve version and tag
        id: version
        shell: bash
        run: |
          version_ref="${VERSION_REF}"
          version="${version_ref#refs/tags/}"
          version="${version#v}"
          npm_tag="${INPUT_TAG:-latest}"

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release version: $version" >&2
            exit 1
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "npm-tag=${npm_tag}" >> "$GITHUB_OUTPUT"
        env:
          VERSION_REF: ${{ inputs.version || github.ref }}
          INPUT_TAG: ${{ inputs.tag || 'latest' }}

  release:
    if: github.repository == 'TianJianJun0727/ycloud-icons'
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: '@ycloud-web/icons'
            hasTest: true
          - package: '@ycloud-web/icons-react'
            hasTest: true
          - package: '@ycloud-web/icons-vue'
            hasTest: true
          - package: '@ycloud-web/icons-data'
            hasTest: true
          - package: '@ycloud-web/icons-angular'
            hasTest: true
          - package: '@ycloud-web/icons-astro'
            hasTest: true
          - package: '@ycloud-web/icons-svelte'
            hasTest: true
          - package: '@ycloud-web/icons-solid'
            hasTest: true
          - package: '@ycloud-web/icons-preact'
            hasTest: true
          - package: '@ycloud-web/icons-react-native'
            hasTest: true
          - package: '@ycloud-web/icons-static'
            hasTest: false

    steps:
      - name: Configure git default branch
        run: git config --global init.defaultBranch main

      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref || github.ref }}

      - uses: ./.github/actions/setup-pnpm
        with:
          registry-url: https://registry.npmjs.org
          cache-mode: restore

      - name: Verify pnpm version
        run: pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set package version
        run: node ./scripts/syncPackageVersions.mts "${VERSION}"
        env:
          VERSION: ${{ needs.prepare.outputs.version }}

      - name: Build
        run: pnpm --filter ${{ matrix.package }} build

      - name: Test
        if: ${{ matrix.hasTest == true }}
        run: pnpm --filter ${{ matrix.package }} test

      - name: Publish
        shell: bash
        run: |
          if npm view "${PACKAGE}@${VERSION}" version >/dev/null 2>&1; then
            echo "${PACKAGE}@${VERSION} is already published. Skipping."
            exit 0
          fi

          pnpm --filter "${PACKAGE}" publish --tag "${NPM_TAG}" --access public --provenance --no-git-checks
        env:
          PACKAGE: ${{ matrix.package }}
          VERSION: ${{ needs.prepare.outputs.version }}
          NPM_TAG: ${{ needs.prepare.outputs.npm-tag }}
          NPM_CONFIG_PROVENANCE: true

  github-release:
    if: github.repository == 'TianJianJun0727/ycloud-icons'
    needs:
      - prepare
      - release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Configure git default branch
        run: git config --global init.defaultBranch main

      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref || github.ref }}

      - uses: ./.github/actions/setup-pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate bilingual release notes
        run: node ./scripts/writeChangelog.mts
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ vars.AI_BASE_URL }}
          AI_MODEL: ${{ vars.AI_MODEL }}
          YCLOUD_AI_CHANGELOG: '1'
          YCLOUD_AI_CHANGELOG_VERSION: ${{ needs.prepare.outputs.version }}
          YCLOUD_CHANGELOG_RELEASE_NOTES_PATH: .release-notes.md

      - name: Commit persisted changelog notes
        shell: bash
        run: |
          git add CHANGELOG.md docs/.vitepress/data/CHANGELOG.en.md docs/.vitepress/data/changelogSidebar.ts
          if [ -f "changelogs/releases/v${VERSION}.json" ]; then
            git add "changelogs/releases/v${VERSION}.json"
          fi

          if git diff --cached --quiet; then
            echo "No changelog notes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "docs: add changelog for v${VERSION} [skip docs]"
          git push origin HEAD:main
        env:
          VERSION: ${{ needs.prepare.outputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          name: Version ${{ needs.prepare.outputs.version }}
          body_path: .release-notes.md

  sync-versions:
    if: github.repository == 'TianJianJun0727/ycloud-icons'
    needs:
      - prepare
      - release
      - github-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Configure git default branch
        run: git config --global init.defaultBranch main

      - uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - uses: ./.github/actions/setup-pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync package versions
        run: node ./scripts/syncPackageVersions.mts "${VERSION}"
        env:
          VERSION: ${{ needs.prepare.outputs.version }}

      - name: Commit synced package versions
        shell: bash
        run: |
          if git diff --quiet -- packages; then
            echo "No package version changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/*/package.json
          git commit -m "chore(release): sync package versions to ${VERSION} [skip docs]"
          git push origin HEAD:main
        env:
          VERSION: ${{ needs.prepare.outputs.version }}

  # Temporarily disable automatic docs deployment after package releases.
  # Keep this job for quick restoration when release-driven docs publishing is needed again.
