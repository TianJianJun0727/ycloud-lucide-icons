name: Release Packages

on:
  push:
    tags:
      - 'v*'

  workflow_dispatch:
    inputs:
      version:
        required: true
        description: Version
        type: string
      tag:
        description: NPM tag
        default: latest
        type: choice
        options:
          - latest
          - next
          - beta
          - alpha
      ref:
        description: Git ref to publish from. Use the release tag when available.
        default: ''
        type: string

  workflow_call:
    inputs:
      version:
        required: true
        description: Version
        type: string
      tag:
        description: NPM tag
        default: latest
        type: string
      ref:
        description: Git ref to publish from. Use the release tag when available.
        default: ''
        type: string

permissions:
  contents: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  prepare:
    if: github.repository == 'TianJianJun0727/ycloud-icons'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      npm-tag: ${{ steps.version.outputs.npm-tag }}
      ref: ${{ steps.version.outputs.ref }}
      core-published: ${{ steps.version.outputs.core-published }}
      frameworks-matrix: ${{ steps.version.outputs.frameworks-matrix }}
      has-frameworks: ${{ steps.version.outputs.has-frameworks }}

    steps:
      - name: Resolve release plan
        id: version
        shell: bash
        run: |
          version_ref="${VERSION_REF}"
          version="${version_ref#refs/tags/}"
          version="${version#v}"
          npm_tag="${INPUT_TAG:-latest}"

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release version: $version" >&2
            exit 1
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "npm-tag=${npm_tag}" >> "$GITHUB_OUTPUT"
          echo "ref=${INPUT_REF:-v${version}}" >> "$GITHUB_OUTPUT"
          export RELEASE_VERSION="${version}"

          node <<'NODE' >> "$GITHUB_OUTPUT"
          const { execFileSync } = require('node:child_process');

          const version = process.env.RELEASE_VERSION;
          const packages = [
            { package: '@ycloud-web/icons-react', hasTest: true },
            { package: '@ycloud-web/icons-vue', hasTest: true },
            { package: '@ycloud-web/icons-data', hasTest: true },
            { package: '@ycloud-web/icons-angular', hasTest: true },
            { package: '@ycloud-web/icons-astro', hasTest: true },
            { package: '@ycloud-web/icons-svelte', hasTest: true },
            { package: '@ycloud-web/icons-solid', hasTest: true },
            { package: '@ycloud-web/icons-preact', hasTest: true },
            { package: '@ycloud-web/icons-react-native', hasTest: true },
            { package: '@ycloud-web/icons-static', hasTest: false },
          ];

          const isPublished = (packageName) => {
            try {
              execFileSync('npm', ['view', `${packageName}@${version}`, 'version'], {
                stdio: 'ignore',
              });
              return true;
            } catch {
              return false;
            }
          };

          const corePublished = isPublished('@ycloud-web/icons');
          const unpublishedFrameworks = packages.filter((item) => !isPublished(item.package));

          console.log(`core-published=${corePublished}`);
          console.log(`frameworks-matrix=${JSON.stringify(unpublishedFrameworks)}`);
          console.log(`has-frameworks=${unpublishedFrameworks.length > 0}`);

          if (corePublished) {
            console.error(`@ycloud-web/icons@${version} is already published.`);
          } else {
            console.error(`@ycloud-web/icons@${version} is not published yet.`);
          }

          for (const item of packages) {
            const state = unpublishedFrameworks.some((unpublished) => unpublished.package === item.package)
              ? 'not published yet'
              : 'already published';
            console.error(`${item.package}@${version} is ${state}.`);
          }
          NODE
        env:
          VERSION_REF: ${{ inputs.version || github.ref }}
          INPUT_TAG: ${{ inputs.tag || 'latest' }}
          INPUT_REF: ${{ inputs.ref || '' }}

  release-core:
    if: github.repository == 'TianJianJun0727/ycloud-icons'
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Configure git default branch
        if: needs.prepare.outputs.core-published != 'true'
        run: git config --global init.defaultBranch main

      - uses: actions/checkout@v7
        if: needs.prepare.outputs.core-published != 'true'
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.ref }}

      - uses: ./.github/actions/setup-pnpm
        if: needs.prepare.outputs.core-published != 'true'
        with:
          registry-url: https://registry.npmjs.org
          cache-mode: restore

      - name: Verify pnpm version
        if: needs.prepare.outputs.core-published != 'true'
        run: pnpm --version

      - name: Install dependencies
        if: needs.prepare.outputs.core-published != 'true'
        run: pnpm install --frozen-lockfile

      - name: Set package version
        if: needs.prepare.outputs.core-published != 'true'
        run: node ./scripts/syncPackageVersions.mts "${VERSION}"
        env:
          VERSION: ${{ needs.prepare.outputs.version }}

      - name: Build
        if: needs.prepare.outputs.core-published != 'true'
        run: pnpm --filter @ycloud-web/icons build

      - name: Test
        if: needs.prepare.outputs.core-published != 'true'
        run: pnpm --filter @ycloud-web/icons test

      - name: Publish
        if: needs.prepare.outputs.core-published != 'true'
        shell: bash
        run: |
          wait_for_package_version() {
            for visibility_attempt in 1 2 3 4 5 6; do
              if npm view "${PACKAGE}@${VERSION}" version >/dev/null 2>&1; then
                echo "${PACKAGE}@${VERSION} is visible on npm."
                return 0
              fi

              echo "Waiting for ${PACKAGE}@${VERSION} to become visible on npm (${visibility_attempt}/6)."
              sleep 10
            done

            return 1
          }

          for attempt in 1 2 3; do
            if pnpm --filter "${PACKAGE}" publish --tag "${NPM_TAG}" --access public --provenance --no-git-checks; then
              if wait_for_package_version; then
                exit 0
              fi

              echo "${PACKAGE}@${VERSION} was published, but npm did not expose it before the visibility timeout." >&2
              exit 1
            fi

            if wait_for_package_version; then
              echo "${PACKAGE}@${VERSION} is now published after a failed publish response."
              exit 0
            fi

            if [[ "$attempt" == "3" ]]; then
              echo "Failed to publish ${PACKAGE}@${VERSION} after ${attempt} attempts." >&2
              exit 1
            fi

            sleep $((attempt * 20))
          done
        env:
          PACKAGE: '@ycloud-web/icons'
          VERSION: ${{ needs.prepare.outputs.version }}
          NPM_TAG: ${{ needs.prepare.outputs.npm-tag }}
          NPM_CONFIG_PROVENANCE: true

  release-frameworks:
    if: github.repository == 'TianJianJun0727/ycloud-icons' && needs.prepare.outputs.has-frameworks == 'true'
    runs-on: ubuntu-latest
    needs:
      - prepare
      - release-core
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.prepare.outputs.frameworks-matrix) }}

    steps:
      - name: Configure git default branch
        run: git config --global init.defaultBranch main

      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.ref }}

      - uses: ./.github/actions/setup-pnpm
        with:
          registry-url: https://registry.npmjs.org
          cache-mode: restore

      - name: Verify pnpm version
        run: pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set package version
        run: node ./scripts/syncPackageVersions.mts "${VERSION}"
        env:
          VERSION: ${{ needs.prepare.outputs.version }}

      - name: Build core package
        run: pnpm --filter @ycloud-web/icons build

      - name: Build
        run: pnpm --filter ${{ matrix.package }} build

      - name: Test
        if: ${{ matrix.hasTest == true }}
        run: pnpm --filter ${{ matrix.package }} test

      - name: Publish
        shell: bash
        run: |
          wait_for_package_version() {
            for visibility_attempt in 1 2 3 4 5 6; do
              if npm view "${PACKAGE}@${VERSION}" version >/dev/null 2>&1; then
                echo "${PACKAGE}@${VERSION} is visible on npm."
                return 0
              fi

              echo "Waiting for ${PACKAGE}@${VERSION} to become visible on npm (${visibility_attempt}/6)."
              sleep 10
            done

            return 1
          }

          for attempt in 1 2 3; do
            if pnpm --filter "${PACKAGE}" publish --tag "${NPM_TAG}" --access public --provenance --no-git-checks; then
              if wait_for_package_version; then
                exit 0
              fi

              echo "${PACKAGE}@${VERSION} was published, but npm did not expose it before the visibility timeout." >&2
              exit 1
            fi

            if wait_for_package_version; then
              echo "${PACKAGE}@${VERSION} is now published after a failed publish response."
              exit 0
            fi

            if [[ "$attempt" == "3" ]]; then
              echo "Failed to publish ${PACKAGE}@${VERSION} after ${attempt} attempts." >&2
              exit 1
            fi

            sleep $((attempt * 20))
          done
        env:
          PACKAGE: ${{ matrix.package }}
          VERSION: ${{ needs.prepare.outputs.version }}
          NPM_TAG: ${{ needs.prepare.outputs.npm-tag }}
          NPM_CONFIG_PROVENANCE: true

  github-release:
    if: ${{ always() && github.repository == 'TianJianJun0727/ycloud-icons' && needs.prepare.result == 'success' && needs.release-core.result == 'success' && (needs.release-frameworks.result == 'success' || needs.release-frameworks.result == 'skipped') }}
    needs:
      - prepare
      - release-core
      - release-frameworks
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Configure git default branch
        run: git config --global init.defaultBranch main

      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.ref }}

      - uses: ./.github/actions/setup-pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate bilingual release notes
        run: node ./scripts/writeChangelog.mts
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ vars.AI_BASE_URL }}
          AI_MODEL: ${{ vars.AI_MODEL }}
          YCLOUD_AI_CHANGELOG: '1'
          YCLOUD_AI_CHANGELOG_VERSION: ${{ needs.prepare.outputs.version }}
          YCLOUD_CHANGELOG_RELEASE_NOTES_PATH: .release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          name: Version ${{ needs.prepare.outputs.version }}
          body_path: .release-notes.md

  # Temporarily disable automatic docs deployment after package releases.
  # Keep this job for quick restoration when release-driven docs publishing is needed again.
