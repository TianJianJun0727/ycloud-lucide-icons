name: Pull request metadata suggestions

on:
  pull_request_target:
    paths:
      - 'icons/*.json'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  pull-request-metadata-suggestions:
    name: Pull Request Metadata Suggestions
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      #  We checkout the main branch of main repository for security reasons.
      #  This is to prevent the workflow from running on a forked repository.
      - uses: actions/checkout@v7
        with:
          repository: TianJianJun0727/ycloud-icons
      - uses: ./.github/actions/setup-pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate comment markup
        run: node ./scripts/suggestIconMetadata.mts
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ vars.AI_BASE_URL }}
          AI_MODEL: ${{ vars.AI_MODEL }}
          PULL_REQUEST_NUMBER: ${{ github.event.number }}
          COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
