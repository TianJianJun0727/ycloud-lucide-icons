name: Fix Icon Source

on:
  pull_request:
    paths:
      - 'icons/*.svg'
      - 'icons/*.json'
      - 'categories/*.json'
      - 'business-icons/**/*.svg'
      - 'business-icons/**/*.json'
      - 'illustration-icons/**/*.svg'
      - 'illustration-icons/**/*.json'
      - 'scripts/data/allowedNonChineseTerms.json'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: read

jobs:
  fix-icon-source:
    name: Fix Icon Source
    if: github.repository == 'TianJianJun0727/ycloud-icons' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.YCLOUD_ICONS_APP_ID }}
          private-key: ${{ secrets.YCLOUD_ICONS_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ steps.app-token.outputs.token }}

      - uses: ./.github/actions/setup-pnpm
        with:
          cache-mode: restore

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Get changed icon source files
        id: changed-files
        uses: tj-actions/changed-files@v47
        with:
          files: |
            icons/*.svg
            business-icons/**/*.svg
            business-icons/**/*.json
            illustration-icons/**/*.svg
            illustration-icons/**/*.json
            icons/*.json
            categories/*.json

      - name: Detect changed source scope
        id: source-change-kind
        run: |
          generic_changed=false
          business_changed=false
          illustration_changed=false
          generic_source_changed=false
          business_source_changed=false
          illustration_source_changed=false

          for file in ${{ steps.changed-files.outputs.all_changed_files }}; do
            if [[ "$file" == icons/* || "$file" == categories/* ]]; then
              generic_changed=true
            elif [[ "$file" == business-icons/* ]]; then
              business_changed=true
            elif [[ "$file" == illustration-icons/* ]]; then
              illustration_changed=true
            fi
          done

          for file in ${{ steps.changed-files.outputs.added_files }} ${{ steps.changed-files.outputs.modified_files }} ${{ steps.changed-files.outputs.renamed_files }}; do
            if [[ "$file" == icons/* || "$file" == categories/* ]]; then
              generic_source_changed=true
            elif [[ "$file" == business-icons/* ]]; then
              business_source_changed=true
            elif [[ "$file" == illustration-icons/* ]]; then
              illustration_source_changed=true
            fi
          done

          echo "generic_changed=$generic_changed" >> "$GITHUB_OUTPUT"
          echo "business_changed=$business_changed" >> "$GITHUB_OUTPUT"
          echo "illustration_changed=$illustration_changed" >> "$GITHUB_OUTPUT"
          echo "generic_source_changed=$generic_source_changed" >> "$GITHUB_OUTPUT"
          echo "business_source_changed=$business_source_changed" >> "$GITHUB_OUTPUT"
          echo "illustration_source_changed=$illustration_source_changed" >> "$GITHUB_OUTPUT"

      - name: Optimize changed SVGs
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          svg_files=()
          for file in ${{ steps.changed-files.outputs.added_files }} ${{ steps.changed-files.outputs.modified_files }} ${{ steps.changed-files.outputs.renamed_files }}; do
            if [[ "$file" == icons/*.svg && -f "$file" ]]; then
              svg_files+=("$file")
            fi
          done

          if (( ${#svg_files[@]} > 0 )); then
            node ./scripts/optimizeStagedSvgs.mts "${svg_files[@]}"
            pnpm exec prettier --parser html --write "${svg_files[@]}"
          fi

          business_svg_files=()
          for file in ${{ steps.changed-files.outputs.added_files }} ${{ steps.changed-files.outputs.modified_files }} ${{ steps.changed-files.outputs.renamed_files }}; do
            if [[ "$file" == business-icons/*/*.svg && -f "$file" ]]; then
              business_svg_files+=("$file")
            fi
          done

          if (( ${#business_svg_files[@]} > 0 )); then
            node ./scripts/optimizeStagedBusinessSvgs.mts "${business_svg_files[@]}"
          fi

          if [[ "${{ steps.source-change-kind.outputs.business_changed }}" == "true" ]]; then
            node ./scripts/writeBusinessIconIndex.mts
            pnpm exec oxfmt business-icons/index.json
          fi

          if [[ "${{ steps.source-change-kind.outputs.illustration_changed }}" == "true" ]]; then
            node ./scripts/writeIllustrationIndex.mts
            pnpm exec oxfmt illustration-icons/index.json
          fi

      - name: Complete changed metadata i18n
        if: steps.source-change-kind.outputs.generic_source_changed == 'true'
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ vars.AI_BASE_URL }}
          AI_MODEL: ${{ vars.AI_MODEL }}
        run: |
          json_files=()
          for file in ${{ steps.changed-files.outputs.added_files }} ${{ steps.changed-files.outputs.modified_files }} ${{ steps.changed-files.outputs.renamed_files }}; do
            if [[ ( "$file" == icons/*.json || "$file" == categories/*.json ) && -f "$file" ]]; then
              json_files+=("$file")
            fi
          done

          if (( ${#json_files[@]} > 0 )); then
            node ./scripts/fixMetadata.mts "${json_files[@]}"
          fi

      - name: Format changed metadata
        if: steps.source-change-kind.outputs.generic_source_changed == 'true' || steps.source-change-kind.outputs.business_source_changed == 'true' || steps.source-change-kind.outputs.illustration_source_changed == 'true'
        run: |
          format_files=()
          for file in ${{ steps.changed-files.outputs.added_files }} ${{ steps.changed-files.outputs.modified_files }} ${{ steps.changed-files.outputs.renamed_files }}; do
            if [[ ( "$file" == icons/*.json || "$file" == categories/*.json || "$file" == business-icons/*.json || "$file" == business-icons/*/*.json || "$file" == illustration-icons/*.json ) && -f "$file" ]]; then
              format_files+=("$file")
            fi
          done

          if (( ${#format_files[@]} > 0 )); then
            pnpm exec oxfmt "${format_files[@]}"
          fi

      - name: Validate changed icon source
        run: |
          generic_svg_files=()
          icon_json_files=()
          category_json_files=()
          for file in ${{ steps.changed-files.outputs.added_files }} ${{ steps.changed-files.outputs.modified_files }} ${{ steps.changed-files.outputs.renamed_files }}; do
            if [[ "$file" == icons/*.svg && -f "$file" ]]; then
              generic_svg_files+=("$file")
            elif [[ "$file" == icons/*.json && -f "$file" ]]; then
              icon_json_files+=("$file")
            elif [[ "$file" == categories/*.json && -f "$file" ]]; then
              category_json_files+=("$file")
            fi
          done

          if [[ "${{ steps.source-change-kind.outputs.generic_changed }}" == "true" ]]; then
            if (( ${#generic_svg_files[@]} > 0 )); then
              node ./scripts/checkSvgSource.mts "${generic_svg_files[@]}"
              pnpm exec prettier --parser html --check "${generic_svg_files[@]}"
            fi

            pnpm lint:json
            ADDED_FILES="${{ steps.changed-files.outputs.added_files }}" pnpm checkIcons
          fi

          if (( ${#icon_json_files[@]} > 0 )); then
            node ./scripts/checkIconMetadata.mts "${icon_json_files[@]}"
          fi

          if (( ${#category_json_files[@]} > 0 )); then
            node ./scripts/checkCategoryMetadata.mts "${category_json_files[@]}"
          fi

          if [[ "${{ steps.source-change-kind.outputs.business_changed }}" == "true" ]]; then
            node ./scripts/checkBusinessSvgSource.mts
          fi

          if [[ "${{ steps.source-change-kind.outputs.illustration_changed }}" == "true" ]]; then
            node ./scripts/checkIllustrationSvgSource.mts
          fi

      - name: Commit fixes
        run: |
          if git diff --quiet; then
            echo "No icon source fixes needed."
            exit 0
          fi

          git config user.name "ycloud-icons-source-bot[bot]"
          git config user.email "ycloud-icons-source-bot[bot]@users.noreply.github.com"
          git add icons business-icons illustration-icons categories scripts/data/allowedNonChineseTerms.json
          HUSKY=0 git commit -m "fix(icons): normalize icon source files"
          git push
