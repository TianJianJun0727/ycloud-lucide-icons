name: Continuous integration icons

on:
  push:
    branches:
      - main
    paths:
      - icons/**/*.svg

  workflow_dispatch:
    inputs:
      version:
        description: Version
        required: true
      tag:
        required: true
        description: NPM tag
        default: 'latest'
        type: choice
        options:
          - latest
          - next
          - beta
          - alpha

permissions:
  id-token: write # Required for OIDC
  contents: write

# This is added to make sure we wait until last release is done, this is needed for the font-build process
concurrency:
  group: continuous-integration

jobs:
  check-dispatch-gate:
    if: github.repository == 'TianJianJun0727/ycloud-icons' &&
      startsWith(github.event.head_commit.message, 'feat(icons)') &&
      github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      RELEASE_ENVIRONMENT: ${{ steps.environment.outputs.RELEASE_ENVIRONMENT }}
    steps:
      - name: Configure git default branch
        run: git config --global init.defaultBranch main

      - uses: actions/checkout@v7

      - name: Fetch tags
        run: git fetch --all --tags

      - name: Check if latest tag was created today
        id: environment
        run: |
          LATEST_TAG=$(git tag --sort=-v:refname | grep -E '^v?[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1)
          TAG_DATE=$(git log -1 --format=%cs "$LATEST_TAG")
          TODAY=$(date +%Y-%m-%d)

          if [ "$TAG_DATE" == "$TODAY" ]; then
            echo "::warning::A release tag already exists for today ($TODAY): $LATEST_TAG. Manual approval will be required to proceed."
            echo "RELEASE_ENVIRONMENT=Icon Release Gated" >> $GITHUB_OUTPUT
          else
            echo "RELEASE_ENVIRONMENT=Icon Release" >> $GITHUB_OUTPUT
          fi

  create-release:
    if: github.repository == 'TianJianJun0727/ycloud-icons'
    needs: check-dispatch-gate
    environment: ${{ needs.check-dispatch-gate.outputs.RELEASE_ENVIRONMENT }}
    runs-on: ubuntu-latest
    outputs:
      VERSION: ${{ steps.new-version.outputs.NEW_VERSION }}
    steps:
      - name: Configure git default branch
        run: git config --global init.defaultBranch main

      - uses: actions/checkout@v7

      - uses: ./.github/actions/setup-pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch tags
        run: git fetch --all --tags

      - name: Get latest tag
        id: latest-tag
        run: |
          latest_tag="$(git tag --sort=-v:refname | grep -E '^v?[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1)"
          if [ -z "$latest_tag" ]; then
            echo "No stable release tag found. Create an initial v0.0.0-style tag before automatic icon releases." >&2
            exit 1
          fi

          latest_version="${latest_tag#v}"
          echo "LATEST_TAG=${latest_tag}" >> "$GITHUB_OUTPUT"
          echo "LATEST_VERSION=${latest_version}" >> "$GITHUB_OUTPUT"

      - name: Log latest tag
        run: echo '${{ steps.latest-tag.outputs.LATEST_TAG }}'

      - name: Check if we can patch
        run: pnpm semver "$LATEST_VERSION" -i minor
        env:
          LATEST_VERSION: ${{ steps.latest-tag.outputs.LATEST_VERSION }}

      - name: Create new version
        id: new-version
        run: echo "NEW_VERSION=$(pnpm semver "$LATEST_VERSION" -i minor)" >> "$GITHUB_OUTPUT"
        env:
          LATEST_VERSION: ${{ steps.latest-tag.outputs.LATEST_VERSION }}

      - name: Check output
        run: echo '${{ steps.new-version.outputs.NEW_VERSION }}'

      - name: Sync package versions
        run: node ./scripts/syncPackageVersions.mts "${VERSION}"
        env:
          VERSION: ${{ steps.new-version.outputs.NEW_VERSION }}

      - name: Commit synced package versions
        shell: bash
        run: |
          if git diff --quiet -- packages; then
            echo "No package version changes to commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add packages/*/package.json
            git commit -m "chore(release): sync package versions to ${VERSION}"
            git push origin HEAD:main
          fi
        env:
          VERSION: ${{ steps.new-version.outputs.NEW_VERSION }}

      - name: Create and push release tag
        run: |
          git tag "v${VERSION}"
          git push origin "v${VERSION}"
        env:
          VERSION: ${{ steps.new-version.outputs.NEW_VERSION }}

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.new-version.outputs.NEW_VERSION }}
          name: Version ${{ steps.new-version.outputs.NEW_VERSION }}
          generate_release_notes: true

  start-release:
    if: github.repository == 'TianJianJun0727/ycloud-icons'
    needs: create-release
    uses: './.github/workflows/release.yml'
    secrets: inherit
    with:
      version: ${{ needs.create-release.outputs.VERSION }}
      ref: v${{ needs.create-release.outputs.VERSION }}

  dispatch-release:
    if: github.event_name == 'workflow_dispatch'
    uses: './.github/workflows/release.yml'
    secrets: inherit
    with:
      version: ${{ inputs.version }}
      tag: ${{ inputs.tag }}
      ref: v${{ inputs.version }}
