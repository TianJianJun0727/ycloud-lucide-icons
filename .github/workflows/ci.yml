name: Continuous integration icons

on:
  push:
    branches:
      - main
    paths:
      - icons/**/*.svg
      - business-icons/**/*.svg
      - illustration-icons/**/*.svg

permissions:
  id-token: write # Required for OIDC
  contents: write
  pull-requests: write

# This is added to make sure we wait until last release is done, this is needed for the font-build process
concurrency:
  group: continuous-integration

jobs:
  detect-figma-icon-merge:
    if: github.repository == 'TianJianJun0727/ycloud-icons' && github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      SHOULD_RELEASE: ${{ steps.detect.outputs.SHOULD_RELEASE }}
      RELEASE_ENVIRONMENT: ${{ steps.environment.outputs.RELEASE_ENVIRONMENT }}
    steps:
      - name: Configure git default branch
        run: git config --global init.defaultBranch main

      - uses: actions/checkout@v7

      - name: Detect merged Figma icon source PR
        id: detect
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          echo "SHOULD_RELEASE=false" >> "$GITHUB_OUTPUT"

          owner="${GITHUB_REPOSITORY%/*}"
          repo="${GITHUB_REPOSITORY#*/}"
          associated_prs="$(
            gh api graphql \
              -f query='
                query($owner: String!, $repo: String!, $oid: GitObjectID!) {
                  repository(owner: $owner, name: $repo) {
                    object(oid: $oid) {
                      ... on Commit {
                        associatedPullRequests(first: 10) {
                          nodes {
                            number
                          }
                        }
                      }
                    }
                  }
                }
              ' \
              -F owner="$owner" \
              -F repo="$repo" \
              -F oid="$GITHUB_SHA"
          )"
          pr_number="$(jq -r '.data.repository.object.associatedPullRequests.nodes[0].number // ""' <<< "$associated_prs")"

          if [[ -z "$pr_number" && "$HEAD_MESSAGE" =~ merge\ icon\ source\ PR\ \#([0-9]+) ]]; then
            pr_number="${BASH_REMATCH[1]}"
          fi

          if [[ -z "$pr_number" ]]; then
            echo "The main push is not associated with an icon source PR."
            exit 0
          fi

          pr_json="$(gh pr view "$pr_number" --repo "$GITHUB_REPOSITORY" --json body,files,headRefName,labels)"

          body="$(jq -r '.body // ""' <<< "$pr_json")"
          head_ref="$(jq -r '.headRefName' <<< "$pr_json")"
          has_figma_source="$(
            jq -r '.labels[].name' <<< "$pr_json" | grep -Fx "来源：Figma" || true
          )"
          if [[ "$body" == *"ycloud-icons-source:figma-plugin"* || "$head_ref" == figma-plugin/* ]]; then
            has_figma_source=true
          fi

          if [[ -z "$has_figma_source" ]]; then
            echo "The merged icon source PR is not from Figma."
            exit 0
          fi

          changed_icon_svgs="$(
            jq -r '.files[].path' <<< "$pr_json" |
              grep -E '^(icons/[^/]+\.svg|business-icons/[^/]+/[^/]+\.svg|illustration-icons/([^/]+/)*[^/]+\.svg)$' || true
          )"
          if [[ -z "$changed_icon_svgs" ]]; then
            echo "The merged Figma PR does not change icon SVG files."
            exit 0
          fi

          echo "Figma icon SVG changes detected:"
          echo "$changed_icon_svgs"
          echo "SHOULD_RELEASE=true" >> "$GITHUB_OUTPUT"

      - name: Fetch tags
        if: steps.detect.outputs.SHOULD_RELEASE == 'true'
        run: git fetch --all --tags

      - name: Check if latest tag was created today
        if: steps.detect.outputs.SHOULD_RELEASE == 'true'
        id: environment
        run: |
          LATEST_TAG=$(git tag --sort=-v:refname | grep -E '^v?[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1)
          TAG_DATE=$(git log -1 --format=%cs "$LATEST_TAG")
          TODAY=$(date +%Y-%m-%d)

          if [ "$TAG_DATE" == "$TODAY" ]; then
            echo "::warning::A release tag already exists for today ($TODAY): $LATEST_TAG. Manual approval will be required to proceed."
            echo "RELEASE_ENVIRONMENT=Icon Release Gated" >> $GITHUB_OUTPUT
          else
            echo "RELEASE_ENVIRONMENT=Icon Release" >> $GITHUB_OUTPUT
          fi

  create-release:
    if: >-
      github.repository == 'TianJianJun0727/ycloud-icons' &&
      github.event_name == 'push' &&
      needs.detect-figma-icon-merge.outputs.SHOULD_RELEASE == 'true'
    needs: detect-figma-icon-merge
    environment: ${{ needs.detect-figma-icon-merge.outputs.RELEASE_ENVIRONMENT }}
    runs-on: ubuntu-latest
    outputs:
      VERSION: ${{ steps.new-version.outputs.NEW_VERSION }}
    steps:
      - name: Configure git default branch
        run: git config --global init.defaultBranch main

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.YCLOUD_ICONS_APP_ID }}
          private-key: ${{ secrets.YCLOUD_ICONS_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v7
        with:
          token: ${{ steps.app-token.outputs.token }}

      - uses: ./.github/actions/setup-pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch tags
        run: git fetch --all --tags

      - name: Get latest tag
        id: latest-tag
        run: |
          latest_tag="$(git tag --sort=-v:refname | grep -E '^v?[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1)"
          if [ -z "$latest_tag" ]; then
            echo "No stable release tag found. Create an initial v0.0.0-style tag before automatic icon releases." >&2
            exit 1
          fi

          latest_version="${latest_tag#v}"
          echo "LATEST_TAG=${latest_tag}" >> "$GITHUB_OUTPUT"
          echo "LATEST_VERSION=${latest_version}" >> "$GITHUB_OUTPUT"

      - name: Log latest tag
        run: echo '${{ steps.latest-tag.outputs.LATEST_TAG }}'

      - name: Check if we can create a patch version
        run: pnpm semver "$LATEST_VERSION" -i patch
        env:
          LATEST_VERSION: ${{ steps.latest-tag.outputs.LATEST_VERSION }}

      - name: Create new version
        id: new-version
        run: echo "NEW_VERSION=$(pnpm semver "$LATEST_VERSION" -i patch)" >> "$GITHUB_OUTPUT"
        env:
          LATEST_VERSION: ${{ steps.latest-tag.outputs.LATEST_VERSION }}

      - name: Check output
        run: echo '${{ steps.new-version.outputs.NEW_VERSION }}'

      - name: Prepare release PR
        id: release-pr
        shell: bash
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ vars.AI_BASE_URL }}
          AI_MODEL: ${{ vars.AI_MODEL }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          VERSION: ${{ steps.new-version.outputs.NEW_VERSION }}
          YCLOUD_AI_CHANGELOG: '1'
          YCLOUD_AI_CHANGELOG_VERSION: ${{ steps.new-version.outputs.NEW_VERSION }}
        run: |
          set -euo pipefail

          release_branch="release/v${VERSION}"
          remote_branch_exists="false"

          if git ls-remote --exit-code --heads origin "$release_branch" >/dev/null 2>&1; then
            remote_branch_exists="true"
            git fetch origin "$release_branch"
            git switch "$release_branch"
            git reset --hard "origin/$release_branch"
          else
            git switch -c "$release_branch"
          fi

          node ./scripts/syncPackageVersions.mts "$VERSION"
          node ./scripts/writeChangelog.mts

          git add packages/*/package.json CHANGELOG.md docs/.vitepress/data/CHANGELOG.en.md docs/.vitepress/data/changelogSidebar.ts
          if [ -f "changelogs/releases/v${VERSION}.json" ]; then
            git add "changelogs/releases/v${VERSION}.json"
          fi

          if git diff --cached --quiet; then
            echo "No release preparation changes to commit."
          else
            bot_login="$(gh api user --jq '.login')"
            git config user.name "$bot_login"
            git config user.email "${bot_login}@users.noreply.github.com"
            HUSKY=0 git commit -m "chore(release): prepare v${VERSION}"
          fi

          if [[ "$remote_branch_exists" == "true" ]]; then
            git push --force-with-lease origin "$release_branch"
          else
            git push -u origin "$release_branch"
          fi

          pr_number="$(gh pr list --repo "$GITHUB_REPOSITORY" --head "$release_branch" --state open --json number --jq '.[0].number // empty')"
          if [[ -z "$pr_number" ]]; then
            gh pr create \
              --repo "$GITHUB_REPOSITORY" \
              --base main \
              --head "$release_branch" \
              --title "chore(release): prepare v${VERSION}" \
              --body "Prepare repository files for v${VERSION} before publishing packages."
            pr_number="$(gh pr list --repo "$GITHUB_REPOSITORY" --head "$release_branch" --state open --json number --jq '.[0].number')"
          fi

          echo "number=$pr_number" >> "$GITHUB_OUTPUT"

          if ! gh pr merge "$pr_number" --repo "$GITHUB_REPOSITORY" --auto --squash --subject "chore(release): prepare v${VERSION}"; then
            echo "Failed to enable auto-merge for PR #${pr_number}. This may indicate:" >&2
            echo "  - Required status checks are not satisfied" >&2
            echo "  - Required reviews are missing" >&2
            echo "  - Branch protection rules prevent auto-merge" >&2
            exit 1
          fi

      - name: Wait for release PR and push tag
        run: |
          set -euo pipefail

          pr_number="${{ steps.release-pr.outputs.number }}"
          merge_commit=""

          echo "Waiting for release preparation PR #${pr_number} to merge (max ${MAX_WAIT_ATTEMPTS} attempts)."
          for attempt in $(seq 1 "$MAX_WAIT_ATTEMPTS"); do
            pr_json="$(gh pr view "$pr_number" --repo "$GITHUB_REPOSITORY" --json state,mergeCommit)"
            state="$(jq -r '.state' <<< "$pr_json")"

            if [[ "$state" == "MERGED" ]]; then
              merge_commit="$(jq -r '.mergeCommit.oid' <<< "$pr_json")"
              break
            fi

            if [[ "$state" == "CLOSED" ]]; then
              echo "Release preparation PR #${pr_number} was closed without merging." >&2
              exit 1
            fi

            echo "Waiting for release preparation PR #${pr_number} to merge... (${attempt}/${MAX_WAIT_ATTEMPTS})"
            sleep "$WAIT_INTERVAL_SECONDS"
          done

          if [[ -z "$merge_commit" || "$merge_commit" == "null" ]]; then
            timeout_minutes=$((MAX_WAIT_ATTEMPTS * WAIT_INTERVAL_SECONDS / 60))
            echo "Timed out waiting for release preparation PR #${pr_number} to merge after ${timeout_minutes} minutes." >&2
            echo "Check the PR for failing status checks or missing reviews:" >&2
            echo "  https://github.com/${GITHUB_REPOSITORY}/pull/${pr_number}" >&2
            exit 1
          fi

          git fetch origin main --tags
          if ! git merge-base --is-ancestor "$merge_commit" origin/main; then
            echo "Release preparation PR #${pr_number} merged as ${merge_commit}, but that commit is not in origin/main history." >&2
            echo "Refusing to create v${VERSION}; release tags must point to commits on main." >&2
            exit 1
          fi

          if git rev-parse -q --verify "refs/tags/v${VERSION}" >/dev/null; then
            echo "Release tag v${VERSION} already exists. Automatic releases require a new, unused tag." >&2
            exit 1
          fi

          git tag "v${VERSION}" "$merge_commit"
          git push origin "v${VERSION}"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          VERSION: ${{ steps.new-version.outputs.NEW_VERSION }}
          MAX_WAIT_ATTEMPTS: 30
          WAIT_INTERVAL_SECONDS: 30
