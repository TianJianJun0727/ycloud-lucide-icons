name: Linting PR

on:
  pull_request:
    paths:
      - '**/*.js'
      - '**/*.mjs'
      - '**/*.ts'
      - '**/*.tsx'
      - '**/*.html'
      - '**/*.css'
      - '**/*.scss'
      - '**/*.json'
      - '**/*.yml'
      - '**/*.yaml'
      - .oxfmtignore
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint-code:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-pnpm
      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Get changed generic icon files
        id: changed-generic-icons
        uses: tj-actions/changed-files@v47
        with:
          files: |
            icons/*.svg
            icons/*.json
            categories/*.json

      - name: Get changed business icon files
        id: changed-business-icons
        uses: tj-actions/changed-files@v47
        with:
          files: |
            business-icons/**/*.svg
            business-icons/**/*.json

      - name: Get changed illustration files
        id: changed-illustrations
        uses: tj-actions/changed-files@v47
        with:
          files: |
            illustration-icons/**/*.svg
            illustration-icons/**/*.json

      - name: Run Linter
        run: |
          pnpm lint:es
          pnpm lint:format

          if [[ "${{ steps.changed-generic-icons.outputs.any_changed }}" == "true" ]]; then
            ADDED_FILES="${{ steps.changed-generic-icons.outputs.added_files }}" pnpm checkIcons
          fi

          generic_svg_files=()
          for file in ${{ steps.changed-generic-icons.outputs.added_files }} ${{ steps.changed-generic-icons.outputs.modified_files }} ${{ steps.changed-generic-icons.outputs.renamed_files }}; do
            if [[ "$file" == icons/*.svg && -f "$file" ]]; then
              generic_svg_files+=("$file")
            fi
          done

          if (( ${#generic_svg_files[@]} > 0 )); then
            node ./scripts/checkSvgSource.mts "${generic_svg_files[@]}"
            pnpm exec prettier --parser html --check "${generic_svg_files[@]}"
          fi

          if [[ "${{ steps.changed-business-icons.outputs.any_changed }}" == "true" ]]; then
            pnpm lint:svg:business
          fi

          if [[ "${{ steps.changed-illustrations.outputs.any_changed }}" == "true" ]]; then
            pnpm lint:svg:illustration
          fi

          pnpm lint:json
