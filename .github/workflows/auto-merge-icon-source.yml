name: Auto merge icon source PR

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  auto-merge-icon-source:
    name: Auto merge icon source PR
    if: >-
      github.repository == 'TianJianJun0727/ycloud-icons' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      (
        startsWith(github.event.pull_request.head.ref, 'ycloud-icons-portal/') ||
        contains(github.event.pull_request.body || '', 'ycloud-icons-source:figma-plugin') ||
        contains(github.event.pull_request.body || '', 'ycloud-icons-source:portal')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: read
      statuses: read
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.YCLOUD_ICONS_APP_ID }}
          private-key: ${{ secrets.YCLOUD_ICONS_APP_PRIVATE_KEY }}

      - name: Validate auto-merge scope
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          pr_json="$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json baseRefName,body,files,headRefName,headRepository,isDraft,labels)"

          if [[ "$(jq -r '.isDraft' <<< "$pr_json")" == "true" ]]; then
            echo "Draft PRs are not auto-merged."
            exit 0
          fi

          if [[ "$(jq -r '.baseRefName' <<< "$pr_json")" != "main" ]]; then
            echo "Only PRs targeting main are auto-merged."
            exit 0
          fi

          if [[ "$(jq -r '.headRepository.nameWithOwner' <<< "$pr_json")" != "${{ github.repository }}" ]]; then
            echo "Only same-repository PRs are auto-merged."
            exit 0
          fi

          head_ref="$(jq -r '.headRefName' <<< "$pr_json")"
          body="$(jq -r '.body // ""' <<< "$pr_json")"
          if [[ "$head_ref" != ycloud-icons-portal/* &&
            "$body" != *"ycloud-icons-source:figma-plugin"* &&
            "$body" != *"ycloud-icons-source:portal"* ]]; then
            echo "Only Portal/Figma icon source PRs are auto-merged."
            exit 0
          fi

          blocked_label="$(jq -r '.labels[].name' <<< "$pr_json" | grep -E '^(do-not-merge|needs-review|manual-review)$' || true)"
          if [[ -n "$blocked_label" ]]; then
            echo "Auto-merge blocked by label: $blocked_label"
            exit 0
          fi

          invalid_files="$(
            jq -r '.files[].path' <<< "$pr_json" |
              grep -Ev '^(icons/[^/]+\.(svg|json)|icons/metadata/[^/]+\.json|business-icons/[^/]+/[^/]+\.(svg|json)|business-icons/[^/]+/index\.json|business-icons/index\.json|business-icons/metadata/[^/]+\.json|illustration-icons/[^/]+\.(svg|json)|illustration-icons/index\.json|illustration-icons/metadata/[^/]+\.json|categories/[^/]+\.json|scripts/data/allowedNonChineseTerms\.json)$' || true
          )"
          if [[ -n "$invalid_files" ]]; then
            echo "Auto-merge blocked because this PR changes files outside icon source scope:"
            echo "$invalid_files"
            exit 0
          fi

          icon_source_files="$(
            jq -r '.files[].path' <<< "$pr_json" |
              grep -E '^(icons/|business-icons/|illustration-icons/)' || true
          )"
          if [[ -n "$icon_source_files" ]]; then
            echo "REQUIRE_PACKAGE_CHECKS=true" >> "$GITHUB_ENV"
          fi

          echo "AUTO_MERGE_ALLOWED=true" >> "$GITHUB_ENV"

      - name: Wait for source checks
        if: env.AUTO_MERGE_ALLOWED == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          head_sha="$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json headRefOid --jq '.headRefOid')"
          required_checks="$(jq -c -n --arg requirePackages "${REQUIRE_PACKAGE_CHECKS:-false}" '
            ["Fix Icon Source", "lint-code"] +
            (
              if $requirePackages == "true" then
                [
                  "YCloud Icons",
                  "YCloud Icons Angular",
                  "YCloud Icons Astro",
                  "YCloud Icons Data",
                  "YCloud Icons Preact",
                  "YCloud Icons React",
                  "YCloud Icons React Native",
                  "YCloud Icons Solid",
                  "YCloud Icons Static",
                  "YCloud Icons Svelte",
                  "YCloud Icons Vue"
                ]
              else
                []
              end
            )
          ')"

          for attempt in {1..60}; do
            check_runs="$(gh api "repos/$GITHUB_REPOSITORY/commits/$head_sha/check-runs" --jq '.check_runs')"
            missing_or_pending="$(
              jq -r --argjson required "$required_checks" '
                . as $runs
                |
                $required[]
                | . as $name
                | ($name + ":" + (($runs | map(select(.name == $name))[0].conclusion // map(select(.name == $name))[0].status // "missing")))
              ' <<< "$check_runs" |
              grep -Ev ':(success|skipped)$' || true
            )"

            if [[ -z "$missing_or_pending" ]]; then
              exit 0
            fi

            echo "Waiting for required checks on $head_sha:"
            echo "$missing_or_pending"
            sleep 10
          done

          echo "Required source checks did not pass before timeout." >&2
          exit 1

      - name: Enable native auto-merge
        if: env.AUTO_MERGE_ALLOWED == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr merge "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --auto --squash --subject "feat(icons): merge icon source PR #$PR_NUMBER"
